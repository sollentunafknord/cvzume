<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CV — CVzume</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="/translations.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #F1F5F9;
    min-height: 100vh;
    color: #1a1a2e;
  }

  /* TOOLBAR */
  .toolbar {
    background: white;
    border-bottom: 1px solid #E2E8F0;
    padding: 12px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .toolbar-left { display: flex; align-items: center; gap: 12px; }
  .back-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 16px; border-radius: 8px;
    background: white; border: 1.5px solid #E2E8F0;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 500; color: #475569;
    cursor: pointer; text-decoration: none; transition: all 0.15s;
  }
  .back-btn:hover { border-color: #1A56DB; color: #1A56DB; }
  .toolbar-title { font-size: 15px; font-weight: 600; color: #0D1B2A; }
  .toolbar-right { display: flex; gap: 10px; }
  .btn {
    display: flex; align-items: center; gap: 7px;
    padding: 9px 18px; border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 600;
    cursor: pointer; border: none; transition: all 0.18s;
  }
  .btn-primary { background: #1A56DB; color: white; box-shadow: 0 2px 8px rgba(26,86,219,0.3); }
  .btn-primary:hover { background: #1d4ed8; transform: translateY(-1px); }
  .btn-ghost { background: white; color: #475569; border: 1.5px solid #E2E8F0; }
  .btn-ghost:hover { border-color: #1A56DB; color: #1A56DB; }

  /* PAGE WRAPPER */
  .page-wrapper {
    max-width: 860px;
    margin: 32px auto;
    padding: 0 20px 60px;
  }

  /* CV PAPER */
  .cv-paper {
    background: white;
    border-radius: 4px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    padding: 52px 60px;
  }

  /* CV HEADER */
  .cv-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 36px;
    padding-bottom: 28px;
    border-bottom: 2px solid #E2E8F0;
  }
  .cv-header-left { flex: 1; }
  .cv-name {
    font-family: 'DM Serif Display', serif;
    font-size: 36px; color: #0D1B2A;
    letter-spacing: -0.5px; margin-bottom: 10px;
  }
  .cv-title {
    font-size: 16px; color: #1A56DB;
    font-weight: 600; margin-bottom: 14px;
  }
  .cv-contacts { display: flex; flex-direction: column; gap: 5px; }
  .cv-contact {
    font-size: 13px; color: #475569;
    display: flex; align-items: center; gap: 8px;
  }
  .cv-avatar {
    width: 110px; height: 110px; border-radius: 8px;
    background: #1A56DB; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 36px; font-weight: 700; color: white;
    margin-left: 32px; overflow: hidden;
  }
  .cv-avatar img { width: 100%; height: 100%; object-fit: cover; }

  /* SECTIONS */
  .cv-section { margin-bottom: 32px; }
  .cv-section:last-child { margin-bottom: 0; }

  .cv-section-title {
    font-size: 16px; font-weight: 700;
    color: #1A56DB;
    margin-bottom: 12px;
    padding-bottom: 6px;
    border-bottom: 2px solid #DBEAFE;
  }

  /* PROFIL */
  .cv-summary {
    font-size: 14px; color: #374151;
    line-height: 1.8;
  }

  /* AI SUMMARY */
  .cv-ai-box {
    background: #EFF6FF;
    border-left: 4px solid #1A56DB;
    padding: 14px 18px;
    border-radius: 0 8px 8px 0;
    margin-bottom: 32px;
  }
  .cv-ai-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: #1A56DB; margin-bottom: 6px; }
  .cv-ai-text { font-size: 13px; color: #374151; line-height: 1.7; }

  /* ERFARENHET */
  .exp-item { margin-bottom: 22px; }
  .exp-item:last-child { margin-bottom: 0; }
  .exp-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 2px; }
  .exp-role { font-size: 15px; font-weight: 700; color: #0D1B2A; }
  .exp-dates { font-size: 12px; color: #94A3B8; white-space: nowrap; margin-left: 12px; }
  .exp-company { font-size: 13px; color: #1A56DB; font-weight: 500; margin-bottom: 6px; }
  .exp-desc { font-size: 13px; color: #475569; line-height: 1.7; }

  /* UTBILDNING */
  .edu-item { margin-bottom: 14px; }
  .edu-item:last-child { margin-bottom: 0; }
  .edu-degree { font-size: 14px; font-weight: 600; color: #0D1B2A; }
  .edu-school { font-size: 13px; color: #1A56DB; font-weight: 500; margin-top: 2px; }
  .edu-years { font-size: 12px; color: #94A3B8; margin-top: 2px; }

  /* KOMPETENSER */
  .cv-skills { display: flex; flex-wrap: wrap; gap: 8px; }
  .cv-skill {
    background: #EFF6FF; color: #1A56DB;
    font-size: 13px; font-weight: 500;
    padding: 5px 14px; border-radius: 20px;
    border: 1px solid #BFDBFE;
  }

  /* SPRÅK */
  .cv-lang-item {
    display: flex; align-items: center; gap: 10px;
    font-size: 13px; color: #374151;
    padding: 5px 0;
  }
  .cv-lang-item::before { content: '•'; color: #1A56DB; font-size: 16px; }

  /* TWO COLUMN LAYOUT */
  .cv-two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 40px;
  }

  /* PREVIEW MODAL */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 999;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .modal-content {
    background: white;
    border-radius: 12px;
    width: 100%; max-width: 860px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .modal-header {
    padding: 16px 24px;
    border-bottom: 1px solid #E2E8F0;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; background: white; z-index: 1;
  }
  .modal-title { font-size: 16px; font-weight: 600; color: #0D1B2A; }
  .modal-close {
    width: 32px; height: 32px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; border: none; background: #F1F5F9;
    font-size: 16px; color: #475569;
  }
  .modal-close:hover { background: #E2E8F0; }
  .modal-body { padding: 32px; }
  .modal-footer {
    padding: 16px 24px;
    border-top: 1px solid #E2E8F0;
    display: flex; justify-content: flex-end; gap: 10px;
    position: sticky; bottom: 0; background: white;
  }

  /* PRINT */
  @media print {
    body { background: white; }
    .toolbar { display: none !important; }
    .page-wrapper { margin: 0; padding: 0; max-width: 100%; }
    .cv-paper { box-shadow: none; border-radius: 0; padding: 20mm 20mm; }
    @page { margin: 0; size: A4; }
  }

  /* ── SIDEBAR TOGGLE ── */
  :root { --sidebar-w: 240px; }
  body.sidebar-collapsed { --sidebar-w: 0px; }
  body.sidebar-collapsed .sidebar { transform: translateX(-240px); }
  body.sidebar-collapsed .main { margin-left: 0; }
  
  .sidebar {
    transition: transform 0.25s ease;
  }
  .main {
    transition: margin-left 0.25s ease;
  }

  /* Toggle button */
  .sidebar-toggle {
    position: fixed;
    top: 50%;
    left: 228px;
    transform: translateY(-50%);
    z-index: 200;
    width: 24px; height: 52px;
    border-radius: 0 10px 10px 0;
    border: 1.5px solid rgba(255,255,255,0.15);
    border-left: none;
    background: #1e3a6e;
    color: rgba(255,255,255,0.9);
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 3px 0 12px rgba(0,0,0,0.25);
    transition: left 0.25s ease, background 0.2s;
  }
  .sidebar-toggle:hover {
    background: #1A56DB;
    color: white;
    box-shadow: 3px 0 16px rgba(26,86,219,0.4);
  }
  body.sidebar-collapsed .sidebar-toggle {
    left: 0;
    border-radius: 0 10px 10px 0;
  }

  /* Overlay for mobile */
  .sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 49;
  }
  body.sidebar-open .sidebar-overlay { display: block; }

  /* Desktop: show toggle on hover near edge */
  @media (min-width: 769px) {
    .sidebar-toggle { display: flex; }
  }

  /* Mobile */
  @media (max-width: 768px) {
    :root { --sidebar-w: 240px; }
    .sidebar { transform: translateX(-240px); }
    body.sidebar-open .sidebar { transform: translateX(0); }
    .main { margin-left: 0 !important; }
    .sidebar-toggle { display: flex; left: 12px; }
    body.sidebar-open .sidebar-toggle { left: 252px; }
  }


  /* ═══════════════════════════════════════
     MOBILE RESPONSIVE — CV Template
  ═══════════════════════════════════════ */
  @media (max-width: 768px) {

    .toolbar { padding: 10px 16px 10px 60px; flex-wrap: wrap; gap: 8px; }
    .toolbar-title { font-size: 14px; }
    .toolbar-btn { padding: 8px 12px; font-size: 13px; }

    .cv-wrapper { padding: 12px; }
    .cv-paper {
      transform: scale(0.85);
      transform-origin: top center;
      margin-bottom: -80px;
    }
  }

  @media (max-width: 480px) {
    .cv-paper {
      transform: scale(0.7);
      margin-bottom: -160px;
    }
  }

</style>

<body>
<button class="sidebar-toggle" onclick="toggleSidebar()" id="sidebar-toggle-btn" title="Toggle menu">☰</button>
<div class="sidebar-overlay" onclick="toggleSidebar()"></div>


<!-- TOOLBAR -->
<div class="toolbar">
  <div class="toolbar-left">
    <a href="profile.html" class="back-btn" data-i18n="cv_back">← Mitt CV</a>
    <span class="toolbar-title" id="cv-job-title">CV Förhandsvisning</span>
  </div>
  <div class="toolbar-right">
    <button class="btn btn-ghost" onclick="showPreview()"><span data-i18n="cv_preview">👁 Förhandsgranska</span></button>
    <button class="btn btn-primary" onclick="downloadPDF()"><span data-i18n="cv_download">📥 Ladda ner PDF</span></button>
  </div>
</div>

<!-- PAGE WRAPPER -->
<div class="page-wrapper">
  <div class="cv-paper" id="cv-paper">

    <!-- HEADER -->
    <div class="cv-header">
      <div class="cv-header-left">
        <div class="cv-name" id="cv-name">Namn Efternamn</div>
        <div class="cv-title" id="cv-job-role" style="display:none;"></div>
        <div class="cv-contacts">
          <span class="cv-contact" id="cv-location-el" style="display:none;">📍 </span>
          <span class="cv-contact" id="cv-phone-el" style="display:none;">📞 </span>
          <span class="cv-contact" id="cv-email-el">✉️ </span>
        </div>
      </div>
      <div class="cv-avatar" id="cv-avatar-el">?</div>
    </div>

    <!-- AI SUMMARY (if from job analysis) -->
    <div class="cv-ai-box" id="cv-ai-section" style="display:none;">

    <!-- PROFIL -->
    <div class="cv-section" id="cv-profile-section" style="display:none;">

    </div>

    <!-- ERFARENHET -->
    <div class="cv-section" id="cv-exp-section" style="display:none;">
      <div class="cv-section-title" data-i18n="cv_section_exp">Arbetslivserfarenhet</div>
      <div id="cv-exp-list"></div>
    </div>

    <!-- TWO COLUMN: UTBILDNING + KOMPETENSER & SPRÅK -->

      <!-- UTBILDNING -->
      <div class="cv-section" id="cv-edu-section" style="display:none;">
        <div class="cv-section-title" data-i18n="cv_section_edu">Utbildning</div>

      <!-- KOMPETENSER + SPRÅK -->
      <div>
        <div class="cv-section" id="cv-skills-section" style="display:none;">

        </div>

        <div class="cv-section" id="cv-langs-section" style="display:none; margin-top:24px;">
          <div class="cv-section-title" data-i18n="cv_section_langs">Språk</div>
          <div id="cv-langs-list"></div>

    </div>

<!-- PREVIEW MODAL -->
<div class="modal-overlay" id="preview-modal" style="display:none;">
  <div class="modal-content">
    <div class="modal-header">
      <div class="modal-title">👁 Förhandsvisning — Klicka på Skriv ut för att spara som PDF</div>
      <button class="modal-close" onclick="closePreview()">✕</button>

      <button class="btn btn-ghost" onclick="closePreview()">Stäng</button>
      <button class="btn btn-primary" onclick="confirmPrint()">🖨️ Skriv ut / Spara PDF</button>

<script>
  function handleLogout() {
    const keysToRemove = ['cvita_token','cvita_user','cvita_is_pro','cvita_plan_label','cvita_avatar','cvita_last_result','cvita_active_page','cvita_profile','cvita_pdf_count','cvita_open_app','cvita_language'];
    keysToRemove.forEach(k => localStorage.removeItem(k));
    top.location.href = 'auth.html';
  }

  async function loadCV() {
    const user = JSON.parse(localStorage.getItem('cvita_user') || '{}');
    const result = JSON.parse(localStorage.getItem('cvita_last_result') || '{}');
    const avatarUrl = localStorage.getItem('cvita_avatar');

    // Load profile from Supabase
    let profile = JSON.parse(localStorage.getItem('cvita_profile') || '{}');
    const token = localStorage.getItem('cvita_token');
    if (token && user.id) {
      try {
        const res = await fetch('https://soktmgtrejrlfcmbbzae.supabase.co/rest/v1/profiles?id=eq.' + user.id + '&select=*', {
          headers: {
            'apikey': 'sb_publishable_8Pnblgu8y21ym9Pxsf9flA_A-OErMZX',
            'Authorization': 'Bearer ' + token
          }
        });
        const rows = await res.json();
        if (rows.length > 0) {
          profile = { ...profile, ...rows[0] };
          localStorage.setItem('cvita_profile', JSON.stringify(profile));
          // Load avatar from Supabase if not in localStorage
          if (!avatarUrl && rows[0].avatar_url) {
            localStorage.setItem('cvita_avatar', rows[0].avatar_url);
          }
        }
      } catch(e) { console.error('Profile load error:', e); }
    }

    // Header
    const firstName = user.firstName || '';
    const lastName = user.lastName || '';
    document.getElementById('cv-name').textContent = (firstName + ' ' + lastName).trim() || 'Namn Efternamn';
    document.getElementById('cv-job-title').textContent = result.role ? 'CV — ' + result.role : (localStorage.getItem('cvita_language')==='en'?'CV Preview':localStorage.getItem('cvita_language')==='es'?'Vista previa del CV':localStorage.getItem('cvita_language')==='tr'?'CV Önizleme':'CV Förhandsvisning');

    if (profile.title || result.role) {
      const titleEl = document.getElementById('cv-job-role');
      titleEl.textContent = profile.title || result.role;
      titleEl.style.display = 'block';
    }

    document.getElementById('cv-email-el').textContent = '✉️ ' + (user.email || '');

    if (profile.phone) {
      const el = document.getElementById('cv-phone-el');
      el.textContent = '📞 ' + profile.phone;
      el.style.display = 'flex';
    }
    if (profile.location) {
      const el = document.getElementById('cv-location-el');
      el.textContent = '📍 ' + profile.location;
      el.style.display = 'flex';
    }

    // Avatar
    const avatarEl = document.getElementById('cv-avatar-el');
    const finalAvatar = localStorage.getItem('cvita_avatar');
    if (finalAvatar) {
      const img = document.createElement('img');
      img.src = finalAvatar;
      avatarEl.innerHTML = '';
      avatarEl.appendChild(img);
    } else {
      avatarEl.textContent = ((firstName[0]||'') + (lastName[0]||'')).toUpperCase() || '?';
    }

    // Profil özeti
    if (profile.summary) {
      document.getElementById('cv-profile-text').textContent = profile.summary;
      document.getElementById('cv-profile-section').style.display = 'block';
    }

    // AI CV Summary
    if (result.cvSummary) {
      document.getElementById('cv-ai-summary').textContent = result.cvSummary;
      document.getElementById('cv-ai-section').style.display = 'block';
    }

    // Deneyimler
    if (profile.experiences && profile.experiences.length > 0) {
      document.getElementById('cv-exp-section').style.display = 'block';
      document.getElementById('cv-exp-list').innerHTML = profile.experiences.map(e => `
        <div class="exp-item">
          <div class="exp-header">
            <div class="exp-role">${e.role || ''}</div>
            <div class="exp-dates">${e.start || ''}${e.end ? ' – ' + e.end : ''}</div>
          </div>
          <div class="exp-company">${e.company || ''}</div>
          ${e.desc ? `<div class="exp-desc">${e.desc}</div>` : ''}
        </div>`).join('');
    }

    // Eğitim
    if (profile.educations && profile.educations.length > 0) {
      document.getElementById('cv-edu-section').style.display = 'block';
      document.getElementById('cv-edu-list').innerHTML = profile.educations.map(e => `
        <div class="edu-item">
          <div class="edu-degree">${e.degree || ''}${e.field ? ' · ' + e.field : ''}</div>
          <div class="edu-school">${e.school || ''}</div>
          ${e.years ? `<div class="edu-years">${e.years}</div>` : ''}
        </div>`).join('');
    }

    // Kompetenser
    if (profile.skills && profile.skills.length > 0) {
      document.getElementById('cv-skills-section').style.display = 'block';
      document.getElementById('cv-skills-list').innerHTML = profile.skills
        .map(s => `<span class="cv-skill">${s}</span>`).join('');
    }

    // Diller
    if (profile.languages && profile.languages.length > 0) {
      document.getElementById('cv-langs-section').style.display = 'block';
      document.getElementById('cv-langs-list').innerHTML = profile.languages
        .map(l => `<div class="cv-lang-item">${l}</div>`).join('');
    }
  }

  function showPreview() {
    const paperHtml = document.getElementById('cv-paper').outerHTML;
    document.getElementById('preview-body').innerHTML = paperHtml;
    document.getElementById('preview-modal').style.display = 'flex';
  }

  function closePreview() {
    document.getElementById('preview-modal').style.display = 'none';
  }

  function confirmPrint() {
    closePreview();
    downloadPDF();
  }

  function downloadPDF() {
    const count = parseInt(localStorage.getItem('cvita_pdf_count') || '0');
    localStorage.setItem('cvita_pdf_count', count + 1);
    const name = document.getElementById('cv-name').textContent || 'CV';
    document.title = name + ' — CV';
    window.print();
  }

  document.addEventListener('DOMContentLoaded', () => {
    if (typeof applyTranslations === 'function') applyTranslations();
    loadCV();
  });
</script>

(function() {
  const params = new URLSearchParams(window.location.search);
  const urlLocale = params.get('locale');
  const supportedLocales = ['sv', 'en', 'es', 'tr'];
  if (urlLocale && supportedLocales.includes(urlLocale)) {
    localStorage.setItem('cvita_language', urlLocale);
  }
})();
</script>

<script>
// Token refresh — her sayfada çalışır
(async function refreshTokenIfNeeded() {
  const token = localStorage.getItem('cvita_token');
  const refreshToken = localStorage.getItem('cvita_refresh_token');
  const expiryRaw = localStorage.getItem('cvita_token_expiry');
  if (!token || !refreshToken) return;
  // Expiry kaydedilmemişse (eski oturum) — token JWT'den oku
  let expiry = parseInt(expiryRaw || '0');
  if (!expiryRaw || expiry === 0) {
    try {
      const payload = JSON.parse(atob(token.split('.')[1]));
      expiry = payload.exp * 1000;
      localStorage.setItem('cvita_token_expiry', expiry);
    } catch(e) { return; }
  }
  // 5 dakika kala yenile
  if (Date.now() < expiry - 5 * 60 * 1000) return;
  try {
    const res = await fetch('https://soktmgtrejrlfcmbbzae.supabase.co/auth/v1/token?grant_type=refresh_token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': 'sb_publishable_8Pnblgu8y21ym9Pxsf9flA_A-OErMZX' },
      body: JSON.stringify({ refresh_token: refreshToken })
    });
    if (!res.ok) {
      // Refresh başarısız — logout
      ['cvita_token','cvita_refresh_token','cvita_token_expiry','cvita_user','cvita_is_pro','cvita_plan_label','cvita_avatar','cvita_last_result','cvita_active_page','cvita_profile','cvita_pdf_count','cvita_open_app','cvita_language'].forEach(k => localStorage.removeItem(k));
      top.location.href = '/auth.html';
      return;
    }
    const data = await res.json();
    localStorage.setItem('cvita_token', data.access_token);
    localStorage.setItem('cvita_refresh_token', data.refresh_token);
    localStorage.setItem('cvita_token_expiry', Date.now() + (data.expires_in * 1000));
  } catch(e) { console.warn('Token refresh failed:', e); }
})();

  // Sidebar toggle
  function toggleSidebar() {
    const isMobile = window.innerWidth <= 768;
    if (isMobile) {
      document.body.classList.toggle('sidebar-open');
    } else {
      document.body.classList.toggle('sidebar-collapsed');
      localStorage.setItem('sidebar_collapsed', document.body.classList.contains('sidebar-collapsed') ? '1' : '0');
    }
    updateToggleIcon();
  }

  function updateToggleIcon() {
    const btn = document.getElementById('sidebar-toggle-btn');
    if (!btn) return;
    const isMobile = window.innerWidth <= 768;
    const isOpen = isMobile ? document.body.classList.contains('sidebar-open') : !document.body.classList.contains('sidebar-collapsed');
    btn.textContent = isOpen ? '◀' : '▶';
    if (isMobile) btn.textContent = document.body.classList.contains('sidebar-open') ? '✕' : '☰';
  }

  // Restore sidebar state on desktop
  (function() {
    if (window.innerWidth > 768 && localStorage.getItem('sidebar_collapsed') === '1') {
      document.body.classList.add('sidebar-collapsed');
    }
    window.addEventListener('resize', updateToggleIcon);
    document.addEventListener('DOMContentLoaded', updateToggleIcon);
  })();

</script>
</body>
</html>
