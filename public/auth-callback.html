<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CVzume — Logging in...</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: 'DM Sans', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #F8FAFC; margin: 0; }
    .loading { text-align: center; }
    .spinner { width: 40px; height: 40px; border: 3px solid #E2E8F0; border-top-color: #1A56DB; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { color: #64748B; font-size: 15px; }
  </style>
</head>
<body>
  <div class="loading">
    <div class="spinner"></div>
    <p id="status">Giriş yapılıyor...</p>
  </div>

  <script>
    const SUPABASE_URL = 'https://soktmgtrejrlfcmbbzae.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNva3RtZ3RyZWpybGZjbWJiemFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDI5MTI2OTEsImV4cCI6MjA1ODQ4ODY5MX0.VP8VbRxGYHAGnQFHMDV7cM-OUO5RvMI_M8VzqPOvSvg';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function handleCallback() {
      try {
        // Get lang from URL params
        const urlParams = new URLSearchParams(window.location.search);
        const lang = urlParams.get('lang') || localStorage.getItem('cvita_language') || 'sv';

        // Exchange code for session
        const { data: { session }, error } = await supabaseClient.auth.getSession();

        if (error || !session) {
          // Try exchanging code
          const hashParams = new URLSearchParams(window.location.hash.slice(1));
          const accessToken = hashParams.get('access_token');
          const refreshToken = hashParams.get('refresh_token');
          const expiresAt = hashParams.get('expires_at');

          if (accessToken) {
            const user = await supabaseClient.auth.getUser(accessToken);
            if (user.data?.user) {
              saveSession({
                access_token: accessToken,
                refresh_token: refreshToken,
                expires_at: expiresAt,
                user: user.data.user
              }, lang);
              return;
            }
          }
          document.getElementById('status').textContent = 'Giriş başarısız. Yönlendiriliyor...';
          setTimeout(() => { window.location.href = '/' + lang + '/auth'; }, 2000);
          return;
        }

        saveSession(session, lang);
      } catch (e) {
        console.error(e);
        const lang = localStorage.getItem('cvita_language') || 'sv';
        window.location.href = '/' + lang + '/auth';
      }
    }

    function saveSession(session, lang) {
      const user = session.user;
      const fullName = user.user_metadata?.full_name || user.user_metadata?.name || '';
      const nameParts = fullName.split(' ');

      localStorage.setItem('cvita_token', session.access_token);
      localStorage.setItem('cvita_refresh_token', session.refresh_token || '');
      localStorage.setItem('cvita_token_expiry', session.expires_at ? session.expires_at * 1000 : Date.now() + 3600000);
      localStorage.setItem('cvita_language', lang);
      localStorage.setItem('cvita_user', JSON.stringify({
        id: user.id,
        email: user.email,
        first_name: nameParts[0] || user.email.split('@')[0],
        last_name: nameParts.slice(1).join(' ') || ''
      }));

      document.getElementById('status').textContent = 'Başarılı! Yönlendiriliyor...';
      window.location.href = '/' + lang + '/dashboard';
    }

    handleCallback();
  </script>
</body>
</html>
